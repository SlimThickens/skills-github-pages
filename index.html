<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony & The Pup</title>
    <style>
        /* Import some fun, modern fonts */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Smooth moving gradient background */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Trendy Glassmorphism Effect */
        .card {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 50px 40px;
            max-width: 450px;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            position: relative;
            z-index: 10;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px 0 rgba(31, 38, 135, 0.5);
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff4757;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Wiggling Dog Animation */
        .doggo {
            font-size: 6rem;
            margin: 10px 0;
            display: inline-block;
            animation: wag 2s ease-in-out infinite;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.2));
        }

        @keyframes wag {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        p {
            font-size: 1.3rem;
            color: #2f3542;
            line-height: 1.6;
            font-weight: 600;
        }

        /* Flashy Button */
        .money-button {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 40px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: white;
            background: linear-gradient(45deg, #2ed573, #7bed9f);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(46, 213, 115, 0.4);
            transition: all 0.2s ease;
        }

        .money-button:hover {
            transform: scale(1.1) rotate(-3deg);
            background: linear-gradient(45deg, #1e90ff, #70a1ff);
            box-shadow: 0 10px 20px rgba(30, 144, 255, 0.4);
        }

        .money-button:active {
            transform: scale(0.95);
        }
        
        /* Ambient Floating Cash */
        .floating-cash {
            position: absolute;
            font-size: 2.5rem;
            animation: floatUp 6s ease-in-out infinite;
            opacity: 0;
            z-index: 1;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        @keyframes floatUp {
            0% { transform: translateY(100px) rotate(0deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-200px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="floating-cash" style="left: 10%; animation-delay: 0s;">💸</div>
    <div class="floating-cash" style="left: 85%; animation-delay: 1.5s;">💰</div>
    <div class="floating-cash" style="left: 20%; animation-delay: 3s;">💵</div>
    <div class="floating-cash" style="left: 75%; animation-delay: 0.5s;">🪙</div>

    <div class="card">
        <h1>Hi. My name's Tony.</h1>
        <div class="doggo">🐶</div>
        <p>See my cute dog? <br> We would sure appreciate it if you gave us some money.</p>
        <button class="money-button">Thank you! 💸</button>
    </div>

    <script>
        document.querySelector('.money-button').addEventListener('click', function() {
            // Arrays of emojis to rain down
            let rain = ['💵', '💰', '💸', '🪙', '🦴'];
            
            for(let i = 0; i < 35; i++) {
                let drop = document.createElement('div');
                drop.innerText = rain[Math.floor(Math.random() * rain.length)];
                drop.style.position = 'absolute';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.top = '-50px';
                drop.style.fontSize = (Math.random() * 2 + 1) + 'rem';
                drop.style.zIndex = '100';
                drop.style.transition = 'top 2s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                
                // Add a little spin to each drop
                let rotation = Math.random() * 360;
                drop.style.transform = `rotate(${rotation}deg)`;

                document.body.appendChild(drop);
                
                // Trigger the fall
                setTimeout(() => {
                    drop.style.top = '120vh';
                }, 50);

                // Clean up the DOM
                setTimeout(() => {
                    drop.remove();
                }, 2000);
            }
            
            // Change button text and color after click
            this.innerText = "You're awesome! 🐾";
            this.style.background = "linear-gradient(45deg, #ff4757, #ff6b81)";
            this.style.boxShadow = "0 10px 20px rgba(255, 71, 87, 0.4)";
        });
    </script>
</body>
</html>
