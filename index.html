<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shane & The Hot Dogs</title>
    <style>
        /* Base page setup */
        body {
            margin: 0;
            overflow: hidden; /* Prevents scrollbars from the falling hot dogs */
            background-color: #1a1a1a; /* Dark background so the hot dogs pop */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* The shane.mp4 container */
        .video-container {
            position: relative;
            z-index: 10; /* Keeps the video above the static background dogs */
            border: 8px solid #ffcc00;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.4);
            background: #000;
            max-width: 80vw;
            max-height: 80vh;
        }

        video {
            display: block;
            max-width: 100%;
            max-height: 80vh;
            border-radius: 4px;
        }

        /* Hot Dog Base Styles */
        .hotdog {
            user-select: none;
            pointer-events: none; /* Lets you click the video through the hot dogs */
        }

        /* Static hot dogs (just sitting there) */
        .static {
            position: absolute;
            z-index: 1; /* Behind the video */
        }

        /* Wrapper for falling down */
        .raining-wrapper {
            position: absolute;
            top: -15vh; /* Start off-screen */
            z-index: 20; /* Rain OVER the video! */
            animation: fall linear infinite;
            pointer-events: none;
        }

        /* The spinning animation class */
        .spinning {
            animation: spin linear infinite;
            display: inline-block;
        }

        /* Keyframe Animations */
        @keyframes fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(120vh); } /* Fall past the bottom */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="hotdog-world"></div>

    <div class="video-container">
        <video controls autoplay loop>
            <source src="https://SlimThickens.github.io/skills-github-pages/shane.mp4" type="video/mp4">
            Your browser does not support the video tag. Have a hot dog instead 🌭.
        </video>
    </div>

    <script>
        const container = document.getElementById('hotdog-world');
        const hotdogEmoji = '🌭';

        // Helper function for randomness
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        // 1. Scatter the "just sitting there" hot dogs
        function createStaticHotDogs(count) {
            for (let i = 0; i < count; i++) {
                const dog = document.createElement('div');
                dog.classList.add('hotdog', 'static');
                dog.innerText = hotdogEmoji;
                
                // Random position across the whole screen
                dog.style.left = random(0, 100) + 'vw';
                dog.style.top = random(0, 100) + 'vh';
                
                // Random size and rotation
                dog.style.fontSize = random(2, 6) + 'rem';
                dog.style.transform = `rotate(${random(0, 360)}deg)`;
                
                // Randomly flip some horizontally for variety
                if (Math.random() > 0.5) dog.style.transform += ' scaleX(-1)';
                
                container.appendChild(dog);
            }
        }

        // 2. Unleash the "raining and spinning" hot dogs
        function createRainingHotDogs(count) {
            for (let i = 0; i < count; i++) {
                // The wrapper handles the falling (so it doesn't fight the spinning)
                const wrapper = document.createElement('div');
                wrapper.classList.add('raining-wrapper');
                
                // Random horizontal start position
                wrapper.style.left = random(-5, 100) + 'vw';
                
                // Random fall speed
                wrapper.style.animationDuration = `${random(4, 12)}s`;
                
                // Stagger the starts so they don't fall in one giant clump
                wrapper.style.animationDelay = `-${random(0, 20)}s`;

                // The actual hot dog element handles the spinning and sizing
                const dog = document.createElement('div');
                dog.classList.add('hotdog');
                dog.innerText = hotdogEmoji;
                dog.style.fontSize = random(1.5, 4.5) + 'rem';

                // 80% chance it spins wildly
                if (Math.random() > 0.2) {
                    dog.classList.add('spinning');
                    // Random spin speed and direction
                    dog.style.animationDuration = `${random(1, 6)}s`;
                    if (Math.random() > 0.5) {
                        dog.style.animationDirection = 'reverse';
                    }
                }

                wrapper.appendChild(dog);
                container.appendChild(wrapper);
            }
        }

        // --- FIRE UP THE GRILLS ---
        
        // Put 60 hot dogs permanently in the background
        createStaticHotDogs(60); 
        
        // Make 100 hot dogs rain and spin continuously
        createRainingHotDogs(100); 

    </script>
</body>
</html>
